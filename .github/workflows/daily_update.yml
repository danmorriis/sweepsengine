name: Update World Cup Results

on:
  # schedule:
  #   - cron: "0 */2 * * *"
  workflow_dispatch:  # manual trigger only — scheduled runs disabled

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and update results
        run: python fetch_results.py
        env:
          XLSX_PATH: "World Cup 2026 Sweeps.xlsx"

      - name: Export data.json for website
        run: python export_data.py
        env:
          XLSX_PATH: "World Cup 2026 Sweeps.xlsx"

      - name: Commit updated files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "World Cup 2026 Sweeps.xlsx" data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update: match results $(date -u '+%Y-%m-%d')"
            git push
          fi
